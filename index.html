<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps Script + Tailwind</title>
  <!-- 1. 테일윈드 3.x CDN 스크립트 로드 (4.x도 CDN 제공 방식에 따라 가능) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-slate-100 text-slate-800 p-5 font-sans">

  <!-- 컨테이너 -->
  <div class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-md mt-10">
    
    <!-- 제목 -->
    <h2 class="text-2xl font-bold text-slate-700 border-b-2 border-blue-500 pb-3 mb-6">
      정보 입력 (Tailwind CSS)
    </h2>
    
    <!-- 폼 그룹 -->
    <div class="mb-5">
      <label for="username" class="block mb-2 font-semibold text-slate-600">사용자 이름</label>
      <input type="text" id="username" placeholder="이름을 입력하세요" 
             class="w-full p-2.5 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
    </div>

    <!-- 버튼 -->
    <button id="submitBtn" 
            class="w-full p-3 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded transition-colors duration-200 cursor-pointer">
      제출하기
    </button>

    <!-- 상태 메시지 (초기 hidden 처리) -->
    <div id="statusMessage" class="hidden mt-4 p-3 bg-green-100 text-green-800 border border-green-200 rounded text-center font-bold">
      성공적으로 제출되었습니다!
    </div>
  </div>

  <!-- UI 조작 스크립트 -->
  <script>
    const submitBtn = document.getElementById('submitBtn');
    const usernameInput = document.getElementById('username');
    const statusMessage = document.getElementById('statusMessage');

    submitBtn.addEventListener('click', function() {
      if (usernameInput.value.trim() === "") {
        alert("이름을 입력해주세요!");
        statusMessage.classList.add('hidden'); // 테일윈드 hidden 클래스 추가
        return;
      }

      // 테일윈드의 hidden 클래스를 제거하여 요소를 노출
      statusMessage.classList.remove('hidden');
    });
  </script>

</body>
</html>
